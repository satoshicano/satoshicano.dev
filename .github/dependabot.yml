version: 2

updates:
  - package-ecosystem: gomod
    directory: /
    target-branch: main
    schedule:
      interval: daily
      time: "09:00"
      timezone: Asia/Tokyo
    labels:
      - dependencies
    cooldown:
      default-days: 2

  - package-ecosystem: github-actions
    directory: /
    target-branch: main
    schedule:
      interval: daily
      time: "09:00"
      timezone: Asia/Tokyo
    labels:
      - dependencies
    cooldown:
      default-days: 2
